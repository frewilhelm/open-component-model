# Taskfile for OCM Day-2 Migration Scenario
#
# Demonstrates database schema migration delivered as an OCM component artifact,
# executed by a Kubernetes Job orchestrated by kro.
version: '3'

vars:
  CLI_IMAGE: '{{ .CLI_IMAGE | default "ghcr.io/open-component-model/cli:0.0.0-main" }}'
  TOOLKIT_IMAGE: '{{ .TOOLKIT_IMAGE | default "oci://ghcr.io/open-component-model/kubernetes/controller/chart:0.0.0-main" }}'
  PRELOAD_IMAGES: '{{ .PRELOAD_IMAGES | default "" }}'
  DOCKER_NETWORK: '{{ .DOCKER_NETWORK | default "kind" }}'
  VERSION: '1.0.0'
  POSTGRES_VERSION: '{{.POSTGRES_VERSION | default "16"}}'
  KIND_NODE_IMAGE_VERSION: "v1.34.0"
  CTF: '{{ .TASKFILE_DIR }}/tmp/transport-archive'
  CLUSTER_NAME: day2-migration-conformance
  NAME: acme.org/day2/product
  OCM_TMPDIR: '{{ .TASKFILE_DIR }}/tmp'
  REGISTRY_NAME: "registry"
  REGISTRY_PORT: "5001"
  REGISTRY_INTERNAL_PORT: "5000"
  KRO_VERSION: "0.9.0"
  PLATFORMS: "linux/{{ARCH}}"
  ocm: >-
    docker run --rm
    --network {{ .DOCKER_NETWORK }}
    --user $(id -u):$(id -g)
    -v {{ .TASKFILE_DIR }}:{{ .TASKFILE_DIR }}
    -e TMPDIR={{ .OCM_TMPDIR }}
    -e NAME -e VERSION -e POSTGRES_VERSION -e OCI_LAYOUT
    -w $PWD
    {{ .CLI_IMAGE }}

tasks:
  prepare:
    desc: Prepare environment for containerized CLI
    cmds:
      - mkdir -p {{ .OCM_TMPDIR }}

  run:
    deps:
      - check
      - clean
    desc: Run the conformance scenario end-to-end with kind
    cmds:
      - task: prepare
      - task: cluster:setup
      - task: build:product
      - task: cluster:import
      - task: cluster:bootstrap
      - task: verify:deployment

  upgrade:
    desc: Test upgrade scenario (v1.0.0 -> v1.1.0)
    vars:
      NEW_VERSION: "1.1.0"
    cmds:
      - cmd: rm -rf {{.CTF}}
      - task: build:product
        vars:
          VERSION: "{{.NEW_VERSION}}"
      - task: cluster:import
        vars:
          VERSION: "{{.NEW_VERSION}}"
      - cmd: kubectl apply -f deploy/sample-product-1.1.0.yaml
      - cmd: |
          echo "Waiting for migration Job day2-migration-1-1-0 to complete..."
          kubectl wait --for=create job/day2-migration-1-1-0 -n day2-migration --timeout=300s
          kubectl wait --for=condition=complete job/day2-migration-1-1-0 -n day2-migration --timeout=300s
          echo "  Migration Job completed."
      - task: verify:upgrade

  # === BUILD TASKS ===
  build:setup:
    desc: Ensure a buildx builder with OCI export support exists
    status:
      - docker buildx inspect ocm-builder 2>/dev/null | grep -q "Status:.*running"
    cmds:
      - cmd: docker buildx create --name ocm-builder --driver docker-container --bootstrap

  build:migrator:
    desc: Build db-migrator OCM component
    deps:
      - build:setup
    dir: components/db-migrator
    vars:
      NAME: acme.org/day2/db-migrator
      OCI_LAYOUT: './tmp/migrator.tar.gz'
      MIGRATION_DIR: '{{ if eq .VERSION "1.0.0" }}v1{{ else }}v2{{ end }}'
    env:
      NAME: '{{.NAME}}'
      VERSION: '{{.VERSION}}'
      OCI_LAYOUT: '{{.OCI_LAYOUT}}'
    cmds:
      - cmd: mkdir -p tmp
      - cmd: |
          docker buildx build \
            --builder ocm-builder \
            --no-cache \
            --platform {{.PLATFORMS}} \
            --build-arg VERSION={{.VERSION}} \
            --build-arg MIGRATION_DIR={{.MIGRATION_DIR}} \
            -t 'db-migrator:{{.VERSION}}' \
            --output type=oci,dest={{.OCI_LAYOUT}} \
            .
      - defer: rm -rf tmp
      - cmd: |
          {{ .ocm }} add componentversion \
            --repository {{.CTF}} \
            --component-version-conflict-policy=replace \
            --constructor component-constructor.yaml

  build:postgres:
    desc: Build postgres OCM component
    dir: components/postgres
    env:
      NAME: acme.org/day2/postgres
      VERSION: '{{.VERSION}}'
      POSTGRES_VERSION: '{{.POSTGRES_VERSION}}'
    cmd: |
      {{ .ocm }} add componentversion \
        --repository {{.CTF}} \
        --component-version-conflict-policy=replace \
        --constructor component-constructor.yaml

  build:product:
    desc: Build all OCM components into CTF archive
    deps:
      - prepare
      - task: build:migrator
        vars:
          VERSION: '{{.VERSION}}'
      - task: build:postgres
        vars:
          VERSION: '{{.VERSION}}'
    dir: components/product
    env:
      NAME: '{{.NAME}}'
      VERSION: '{{.VERSION}}'
      POSTGRES_VERSION: '{{.POSTGRES_VERSION}}'
    cmds:
      - cmd: |
          {{ .ocm }} add componentversion \
            --repository {{.CTF}} \
            --component-version-conflict-policy=replace \
            --constructor component-constructor.yaml

  # === CLUSTER TASKS ===

  cluster:registry:
    desc: Start local Docker registry if not already running
    status:
      - docker inspect -f '{{`{{.State.Running}}`}}' {{.REGISTRY_NAME}} 2>/dev/null | grep -q true
    cmds:
      - cmd: |
          docker run -d \
            --restart=always \
            --name {{.REGISTRY_NAME}} \
            -p "127.0.0.1:{{.REGISTRY_PORT}}:{{.REGISTRY_INTERNAL_PORT}}" \
            --network bridge \
            registry:2

  cluster:create:
    vars:
      CONTAINERD_CONFIG_PATH: "/etc/containerd/certs.d"
    desc: Create kind cluster with containerd registry config
    status:
      - kind get clusters | grep -q {{.CLUSTER_NAME}}
    cmds:
      - cmd: |
          cat <<EOF | kind create cluster --name {{.CLUSTER_NAME}} --image="kindest/node:{{.KIND_NODE_IMAGE_VERSION}}" --config=-
          kind: Cluster
          apiVersion: kind.x-k8s.io/v1alpha4
          nodes:
          - role: control-plane
          containerdConfigPatches:
          - |-
            [plugins."io.containerd.grpc.v1.cri".registry]
              config_path = "{{.CONTAINERD_CONFIG_PATH}}"
          EOF

  cluster:registry:configure:
    vars:
      CONTAINERD_CONFIG_PATH: "/etc/containerd/certs.d"
    desc: Configure registry access on all cluster nodes
    cmds:
      - cmd: |
          for node in $(kind get nodes --name {{.CLUSTER_NAME}}); do
            HOSTS_DIR="{{.CONTAINERD_CONFIG_PATH}}/{{.REGISTRY_NAME}}:{{.REGISTRY_INTERNAL_PORT}}"
            docker exec "${node}" mkdir -p "${HOSTS_DIR}"
            cat <<EOF | docker exec -i "${node}" cp /dev/stdin "${HOSTS_DIR}/hosts.toml"
          [host."http://{{.REGISTRY_NAME}}:{{.REGISTRY_INTERNAL_PORT}}"]
            skip_verify = true
          EOF
          done
      - cmd: |
          if [ "$(docker inspect -f='{{`{{json .NetworkSettings.Networks.kind}}`}}' {{.REGISTRY_NAME}})" = 'null' ]; then
            docker network connect --alias {{.REGISTRY_NAME}} kind {{.REGISTRY_NAME}}
          fi

  cluster:install:controllers:
    deps:
      - cluster:install:toolkit
      - cluster:install:kro
  cluster:install:toolkit:
    silent: true
    desc: Install OCM controller on cluster
    vars:
      TOOLKIT_NAMESPACE: ocm-k8s-toolkit-system
    cmd: |
      echo "Installing OCM controller..."
      helm install ocm-k8s-toolkit {{ .TOOLKIT_IMAGE }} \
        --namespace {{ .TOOLKIT_NAMESPACE }} \
        --create-namespace \
        --wait --timeout=5m
  cluster:install:kro:
    silent: true
    desc: Install kro (ResourceGraphDefinition controller) via Helm
    cmd: |
      echo "Installing kro..."
      helm install kro oci://registry.k8s.io/kro/charts/kro \
        --namespace kro \
        --create-namespace \
        --version={{.KRO_VERSION}} \
        --wait --timeout=5m

  cluster:preload:
    desc: Pre-load container images into kind cluster (no-op if PRELOAD_IMAGES is empty)
    cmds:
      - for: { var: PRELOAD_IMAGES }
        cmd: kind load image-archive {{.ITEM}} --name {{.CLUSTER_NAME}}

  cluster:setup:
    desc: Set up kind cluster with registry, OCM toolkit, and kro
    cmds:
      - task: cluster:registry
      - task: cluster:create
      - task: cluster:registry:configure
      - task: cluster:preload
      - task: cluster:install:controllers

  cluster:import:
    desc: Transfer CTF archive to cluster registry
    cmd: |
      {{ .ocm }} transfer cv \
        --copy-resources \
        --recursive \
        {{.CTF}}//{{.NAME}}:{{.VERSION}} \
        http://registry:5000

  cluster:bootstrap:
    desc: Bootstrap OCM resources and deploy product
    cmds:
    - cmd: kubectl apply -f deploy/rbac.yaml
    - cmd: kubectl apply -f deploy/namespace.yaml
    - cmd: kubectl apply -f deploy/bootstrap.yaml
    - cmd: kubectl wait --for=condition=Ready -n day2-migration deployer/day2-migration-deployer --timeout=300s
    - cmd: kubectl wait --for=condition=Ready ResourceGraphDefinition/day2-migration-product --timeout=300s
    - cmd: kubectl apply -f deploy/sample-product-1.0.0.yaml
    - cmd: |
        echo "Waiting for PostgreSQL StatefulSet to become ready..."
        kubectl wait --for=create statefulset/day2-migration-postgres -n day2-migration --timeout=300s
        kubectl wait --for=jsonpath='{.status.readyReplicas}'=1 statefulset/day2-migration-postgres -n day2-migration --timeout=300s
        echo "  PostgreSQL is ready."
    - cmd: |
        echo "Waiting for migration Job day2-migration-1-0-0 to complete..."
        kubectl wait --for=create job/day2-migration-1-0-0 -n day2-migration --timeout=300s
        kubectl wait --for=condition=complete job/day2-migration-1-0-0 -n day2-migration --timeout=300s
        echo "  Migration Job completed."

  # === VERIFICATION TASKS ===

  verify:deployment:
    desc: Verify initial deployment (v1.0.0 schema)
    cmds:
      - echo "Verifying v1.0.0 migration..."
      - cmd: |
          kubectl logs job/day2-migration-1-0-0 -n day2-migration | grep -q "001_create_items_table.sql" \
            && echo "  Migration 001 applied" \
            || { echo "  Migration 001 NOT found in logs"; exit 1; }
      - cmd: |
          kubectl exec -n day2-migration day2-migration-postgres-0 -- \
            psql -U day2 -d day2 -c "\d items" | grep -q "name" \
            && echo "  Schema verified: items table exists" \
            || { echo "  Schema verification FAILED"; exit 1; }
      - echo "v1.0.0 deployment verified."

  verify:upgrade:
    desc: Verify upgrade (v1.1.0 schema - category column added)
    cmds:
      - echo "Verifying v1.1.0 migration..."
      - cmd: |
          kubectl logs job/day2-migration-1-1-0 -n day2-migration | grep -q "002_add_category_column.sql" \
            && echo "  Migration 002 applied" \
            || { echo "  Migration 002 NOT found in logs"; exit 1; }
      - cmd: |
          kubectl logs job/day2-migration-1-1-0 -n day2-migration | grep -q "Skipping (already applied): 001" \
            && echo "  Migration 001 correctly skipped (idempotent)" \
            || echo "  (Migration 001 was re-applied - acceptable for fresh deploy)"
      - cmd: |
          kubectl exec -n day2-migration day2-migration-postgres-0 -- \
            psql -U day2 -d day2 -c "\d items" | grep -q "category" \
            && echo "  Schema verified: category column exists" \
            || { echo "  Schema verification FAILED: category column missing"; exit 1; }
      - echo "v1.1.0 upgrade verified."

  # === CLEANUP TASKS ===
  clean:
    desc: Clean up generated data
    cmds:
      - rm -rf {{ .OCM_TMPDIR }}
      - kind delete cluster --name {{.CLUSTER_NAME}} || true
      - docker rm -f registry || true

  # === UTILITY TASKS ===
  check:
    silent: true
    desc: Check required dependencies are installed
    cmds:
      - cmd: which docker || (echo "docker not found" && exit 1)
      - cmd: which kubectl || (echo "kubectl not found" && exit 1)
      - cmd: which kind || (echo "kind not found" && exit 1)
      - cmd: which helm || (echo "Helm not found" && exit 1)
      - cmd: which jq || (echo "jq not found" && exit 1)
  status:
    desc: Show status of all OCM resources
    silent: true
    cmds:
      - echo "=== Repositories ==="
      - kubectl get repositories -A -oyaml
      - echo "=== Components ==="
      - kubectl get components -A -oyaml
      - echo "=== Resources ==="
      - kubectl get resources -A -oyaml
      - echo "=== Deployers ==="
      - kubectl get deployers -A -oyaml
      - echo "=== Jobs ==="
      - kubectl get jobs -n day2-migration
      - echo "=== PVCs ==="
      - kubectl get pvc -n day2-migration
