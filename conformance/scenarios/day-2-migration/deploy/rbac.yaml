# Custom RBAC for the OCM controller in the day-2-migration scenario.
#
# The Deployer controller uses server-side apply (ApplySet) to push
# ResourceGraphDefinitions into the cluster. The default manager-role
# shipped with the Helm chart does not include kro.run permissions,
# so we add them here.
#
# See also: https://ocm.software/docs/how-to/configure-custom-rbac-for-deployers/
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: ocm-controller-day2-migration-scenario
rules:
  - apiGroups:
      - kro.run
    resources:
      - resourcegraphdefinitions
    verbs:
      - create
      - delete
      - get
      - list
      - patch
      - update
      - watch
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: ocm-controller-day2-migration-scenario
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: ocm-controller-day2-migration-scenario
subjects:
  - kind: ServiceAccount
    name: ocm-k8s-toolkit-controller-manager
    namespace: ocm-k8s-toolkit-system
