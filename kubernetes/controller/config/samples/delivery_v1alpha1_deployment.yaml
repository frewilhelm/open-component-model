apiVersion: delivery.ocm.software/v1alpha1
kind: OCMDeployment
metadata:
  labels:
    app.kubernetes.io/name: ocm-k8s-toolkit
    app.kubernetes.io/managed-by: kustomize
  name: deployment-simple
  namespace: default
spec:
  resources:
  - id: ociRepo
    template:
      apiVersion: source.toolkit.fluxcd.io/v1
      kind: OCIRepository
      spec:
        interval: 1m0s
        insecure: true
        layerSelector:
          mediaType: "application/vnd.cncf.helm.chart.content.v1.tar+gzip"
          operation: copy
        # Full chain declares the component; resource() shorthand works for all
        # subsequent references within this deployment.
        url: >
          oci://${repoByRef("oci://ghcr.io/jakobmoellerdev/repo", {"interval": "10m"}).
                  componentByReference("path").
                  resourceByIdentity({"name": "ocirepository"}).
                  toOCI().
                  repository}
        ref:
          digest: ${resource("ocirepository").toOCI().digest}
  - id: helmRelease
    template:
      apiVersion: helm.toolkit.fluxcd.io/v2
      kind: HelmRelease
      spec:
        releaseName: sovereign-postgres
        interval: 1m
        timeout: 5m
        chartRef:
          kind: OCIRepository
          name: ${ociRepo.metadata.name}
        values:
          image:
            repository: '${resource("ocirepository").toOCI().repository}'
