apiVersion: delivery.ocm.software/v1alpha1
kind: OCMDeployment
metadata:
  name: deployment-helm-simple
spec:
  resources:
    - id: ocirepository
      template:
        apiVersion: source.toolkit.fluxcd.io/v1
        kind: OCIRepository
        metadata:
          name: deployment-helm-simple-oci-repository
        spec:
          interval: 1m0s
          insecure: true
          layerSelector:
            mediaType: "application/vnd.cncf.helm.chart.content.v1.tar+gzip"
            operation: copy
          # The first reference uses the full chain — this implicitly declares
          # the repository + component for the resource() shorthand below.
          url: >-
            oci://${repoByRef("http://image-registry:5000",
            {"type": "OCIRegistry", "interval": "10m"}).
            componentByReference("ocm.software/ocm-k8s-toolkit/examples/deployment-helm-simple",
            {"semver": "1.0.0", "interval": "10m"}).
            resourceByIdentity({"name": "helm-resource"}).
            toOCI().registry}/${resource("helm-resource").toOCI().repository}
          ref:
            digest: ${resource("helm-resource").toOCI().digest}

    - id: helmrelease
      template:
        apiVersion: helm.toolkit.fluxcd.io/v2
        kind: HelmRelease
        metadata:
          name: deployment-helm-simple-helm-release
        spec:
          releaseName: deployment-helm-simple
          interval: 1m
          timeout: 5m
          chartRef:
            kind: OCIRepository
            name: ${ocirepository.metadata.name}
            namespace: default
